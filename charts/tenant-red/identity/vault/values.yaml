vaultPodName: vault-server-0
namespace: tenant-red-identity
unsealSecretName: vault-unseal-secret
vault:
  fullnameOverride: vault
  nameOverride: vault
  injector:
    enabled: false
  server:
    image:
      registry: docker.io
      repository: bitnamilegacy/vault
      tag: 1.18.1-debian-12-r1
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  global:
    security:
      allowInsecureImages: true